<script>

function startInput(input){
    if(input.value.trim() === ""){
        input.value = "=0 zł";
    }

    ustawKursor(input);
}

function sprawdzPuste(input){
    if(input.value.trim() === "=0 zł"){
        input.value = "";
    }
}

function ustawKursor(input){
    let pozycja = input.value.indexOf("=");

    if(pozycja < 0){
        pozycja = input.value.length;
    }

    setTimeout(function(){
        input.setSelectionRange(pozycja, pozycja);
    }, 0);
}

function oblicz(input){
    let cenaKg = parseFloat(input.dataset.cena);
    let tekst = input.value.toLowerCase();
    let czescWagi = tekst.split("=")[0];

    czescWagi = czescWagi.replace(/\s/g, "");

    if(czescWagi === ""){
        return {status:"puste"};
    }

    let liczba = parseFloat(czescWagi.replace(",", "."));

    if(isNaN(liczba)){
        return {status:"blad", tekst:czescWagi};
    }

    let jednostka = czescWagi.replace(/[0-9.,]/g, "");
    let kg = 0;

    if(jednostka === ""){
        return {status:"brak-jednostki", tekst:czescWagi};
    }

    if(jednostka === "k" || jednostka === "d" || jednostka === "da"){
        return {status:"brak-jednostki", tekst:czescWagi};
    }

    if(jednostka === "dag"){
        kg = liczba / 100;
    }
    else if(jednostka === "kg"){
        kg = liczba;
    }
    else if(jednostka === "g"){
        kg = liczba / 1000;
    }
    else{
        return {status:"blad", tekst:czescWagi};
    }

    let cena = kg * cenaKg;

    return {
        status:"ok",
        tekst:czescWagi,
        cena:cena
    };
}

function licz(input){
    let wynik = oblicz(input);

    if(wynik.status === "puste"){
        input.value = "=0 zł";
        ustawKursor(input);
        return;
    }

    if(wynik.status === "blad"){
        input.value = wynik.tekst + "=Błąd";
        ustawKursor(input);
        return;
    }

    if(wynik.status === "brak-jednostki"){
        input.value = wynik.tekst + "=0 zł";
        ustawKursor(input);
        return;
    }

    input.value = wynik.tekst + "=" + wynik.cena.toFixed(2) + " zł";
    ustawKursor(input);
}

function dodajDoKoszyka(inputId){
    let input = document.getElementById(inputId);
    let wynik = oblicz(input);

    if(wynik.status !== "ok"){
        alert("Najpierw wpisz poprawną wagę, np. 20dag, 200g albo 1kg.");
        return;
    }

    let produkt = {
        nazwa: input.dataset.nazwa,
        waga: wynik.tekst,
        cenaKg: parseFloat(input.dataset.cena),
        cena: wynik.cena
    };

    let koszyk = JSON.parse(localStorage.getItem("koszykJaslanka")) || [];
    koszyk.push(produkt);
    localStorage.setItem("koszykJaslanka", JSON.stringify(koszyk));

    alert("Dodano do koszyka: " + produkt.nazwa);
}

</script>
