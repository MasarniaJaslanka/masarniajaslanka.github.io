<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Koszyk - Jaślanka</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background-color: #000;
    color:white;
}

.topbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    height: 80px;
    background-image: url("drewno.png");
    background-size: cover;
    background-position: center;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.35),
                inset 0 -4px 8px rgba(255,255,255,0.08);
    border-bottom: 3px solid #3b220f;
}

.menu a{
    margin: 0 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

.brand{
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

.logo-img{
    height: 160px;
}

.koszyk-obraz{
    position: relative;
    width: 100%;
}

.koszyk-obraz img{
    width: 100%;
    display: block;
}

.suma-cena{
    position: absolute;
    top: 43%;
    left: 8%;
    width: 17%;
    text-align: center;
    color: #d9a44d;
    font-size: 24px;
    font-weight: bold;
}

.liczba-produktow{
    position: absolute;
    top: 59%;
    left: 8%;
    width: 17%;
    text-align: center;
    color: #d9a44d;
    font-size: 24px;
    font-weight: bold;
}

.lista-koszyka{
    position: absolute;
    top: 36%;
    left: 30%;
    width: 60%;
    height: 45%;
    overflow-y: auto;
    color: #f1d18a;
    font-size: 18px;
    box-sizing: border-box;
    padding: 10px 20px;
}

.produkt{
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 80px;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid rgba(217,164,77,0.35);
    padding: 10px 0;
}

.produkt button{
    background: rgba(120,30,30,0.85);
    color: white;
    border: 1px solid #d9a44d;
    border-radius: 5px;
    padding: 6px;
    cursor: pointer;
}

.pusty{
    text-align: center;
    margin-top: 100px;
    color: #d9a44d;
    font-size: 24px;
}

.wyczysc-btn{
    position: absolute;
    top: 74%;
    left: 10%;
    background: rgba(120,30,30,0.85);
    color: white;
    border: 1px solid #d9a44d;
    border-radius: 6px;
    padding: 30px 100px;
    cursor: pointer;
    font-weight: bold;
}

.footer{
    background: #1f1f1f;
    color: white;
    padding: 30px 20px;
}

.footer-container{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.footer-box{
    background: #2c2c2c;
    padding: 15px;
    border-radius: 10px;
}

.footer-box h3{
    margin-top: 0;
    color: orange;
}

.footer-bottom{
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}

@media (max-width: 700px){
    .footer-container{
        grid-template-columns: 1fr;
    }

    .lista-koszyka{
        font-size: 10px;
    }

    .produkt{
        grid-template-columns: 1fr;
    }

    .suma-cena,
    .liczba-produktow{
        font-size: 12px;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <div class="menu">
        <a href="sklep.html">Sklep</a>
        <a href="onas.html">O nas</a>
        <a href="praca.html">Praca</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="koszyk.html">Koszyk</a>
    </div>

    <a href="index.html" class="brand">
        <img src="logo.png" class="logo-img">
        Jaślanka
    </a>
</div>

<div class="koszyk-obraz">
    <img src="karta.png">

    <div class="suma-cena" id="suma-cena">0 zł</div>
    <div class="liczba-produktow" id="liczba-produktow">0</div>

    <div class="lista-koszyka" id="lista-koszyka"></div>

    <button class="wyczysc-btn" onclick="wyczyscKoszyk()">Wyczyść</button>
</div>

<div class="footer">
    <div class="footer-container">
        
        <div class="footer-box">
            <h3>Główne sklepy</h3>
            <p>ul. Lwowska 3<br>ul. Rynek 15</p>
        </div>

        <div class="footer-box">
            <h3>Kontakt</h3>
            <p>Tel: 532 503 650<br>Email: masarnia_jaślanka@gmail.com</p>
        </div>

        <div class="footer-box">
            <h3>Informacje</h3>
            <p>Godziny otwarcia:<br>Pn–Sb 6:00–22:00</p>
        </div>

    </div>

    <div class="footer-bottom">
        © 2026 Jaślanka - wszystkie prawa zastrzeżone
    </div>
</div>

<script>

function pokazKoszyk(){
    let koszyk = JSON.parse(localStorage.getItem("koszykJaslanka")) || [];

    let lista = document.getElementById("lista-koszyka");
    let sumaCena = document.getElementById("suma-cena");
    let liczbaProduktow = document.getElementById("liczba-produktow");

    let suma = 0;

    koszyk.forEach(function(produkt){
        suma += produkt.cena;
    });

    sumaCena.innerHTML = suma.toFixed(2) + " zł";
    liczbaProduktow.innerHTML = koszyk.length;

    if(koszyk.length === 0){
        lista.innerHTML = '<div class="pusty">Koszyk jest pusty</div>';
        return;
    }

    let html = "";

    koszyk.forEach(function(produkt, index){
        html += `
            <div class="produkt">
                <div>${produkt.nazwa}</div>
                <div>${produkt.waga}</div>
                <div>${produkt.cena.toFixed(2)} zł</div>
                <button onclick="usunProdukt(${index})">Usuń</button>
            </div>
        `;
    });

    lista.innerHTML = html;
}

function usunProdukt(index){
    let koszyk = JSON.parse(localStorage.getItem("koszykJaslanka")) || [];
    koszyk.splice(index, 1);
    localStorage.setItem("koszykJaslanka", JSON.stringify(koszyk));
    pokazKoszyk();
}

function wyczyscKoszyk(){
    localStorage.removeItem("koszykJaslanka");
    pokazKoszyk();
}

pokazKoszyk();

</script>

</body>
</html>
